services:
  mysql:
    image: mysql:8.4
    container_name: ecomarket-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecomarket
      MYSQL_USER: ecomarket
      MYSQL_PASSWORD: ecomarket
    ports:
      - "3306:3306"
    volumes:
      - ecomarket_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ecomarket_mysql_data:
