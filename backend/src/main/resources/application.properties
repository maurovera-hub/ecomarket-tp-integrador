spring.application.name=ecomarket-backend

# ---------------------------------------------------------------------------
# Base de datos MySQL
# Los valores se pueden sobreescribir por variables de entorno para levantar
# en distintos ambientes sin tocar el codigo.
# ---------------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/ecomarket?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:ecomarket}
spring.datasource.password=${DB_PASSWORD:ecomarket}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------------
# Servidor
# ---------------------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# ---------------------------------------------------------------------------
# CORS - origenes permitidos del frontend (Vite: 5173, CRA: 3000)
# ---------------------------------------------------------------------------
ecomarket.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
